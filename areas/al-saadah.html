<!doctype html>
<html lang="en" dir="ltr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Al Sa’adah Complex</title>
  <meta name="description" content="Facilities and programs at Al Sa’adah Recreation Complex." />
  <meta property="og:title" content="Al Sa’adah Recreation Complex" />
  <meta property="og:description" content="Facilities and programs at Al Sa’adah Complex." />
  <meta property="og:type" content="website" />
  <meta property="og:image" content="/images/og-image.jpg" />
  <link rel="icon" href="/images/favicon.ico" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

<header class="site-header" id="header-placeholder"></header> 
  
  <main class="area-page container">
    <!-- Hero -->
    <section class="area-hero">
      <div class="area-hero-img al-saadah" role="img" aria-label="Al Sa’adah banner"></div>
      <div class="area-hero-overlay"></div>
      <div class="area-hero-content"><h1>Al Sa’adah Recreation Complex</h1></div>
    </section>

    <!-- Overview -->
    <section class="area-overview">
      <h2>Overview</h2>
      <p>A full-service complex for families—bowling, pool, padel, tennis, soccer, track, exercise & aerobics rooms, and indoor entertainment programs.</p>
    </section>

    <!-- Filters -->
    <section class="filters" aria-label="Facility filters">
      <button class="chip" data-filter="all" aria-pressed="true">All</button>
      <button class="chip" data-filter="Fitness">Fitness</button>
      <button class="chip" data-filter="Sports">Sports</button>
      <button class="chip" data-filter="Parks">Parks</button>
      <button class="chip" data-filter="Aquatics">Aquatics</button>
      <button class="chip" data-filter="Entertainment">Entertainment</button>
      <button class="chip" data-filter="Nature">Nature</button>
    </section>

    <!-- Cards -->
    <section class="facility-grid" id="facilityGrid" data-area="al-saadah"></section>
  </main>
    
<footer class="site-footer" id="footer-placeholder"></footer>

  <script src="js/main.js"></script>
  <script src="js/area.js"></script>
</body>
</html>
