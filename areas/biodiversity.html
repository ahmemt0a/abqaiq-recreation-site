<!doctype html>
<html lang="en" dir="ltr">
<head>
  <meta charset="utf-8" />

  <title>Biodiversity Parks</title>

<body>

<header class="site-header" id="header-placeholder"></header>
  
  <main class="area-page container">

    <section class="area-hero">
      <div class="area-hero-img biodiversity" role="img" aria-label="Biodiversity banner"></div>
      <div class="area-hero-overlay"></div>
      <div class="area-hero-content"><h1>Biodiversity Parks</h1></div>

    <section class="filters" aria-label="Facility filters">
      <button class="chip" data-filter="all" aria-pressed="true">All</button>
      <button class="chip" data-filter="Nature">Nature</button>
      <button class="chip" data-filter="Parks">Parks</button>
      <button class="chip" data-filter="Entertainment">Entertainment</button>

    <section class="facility-grid" id="facilityGrid" data-area="biodiversity"></section>
