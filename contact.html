<!doctype html>
<html lang="en" dir="ltr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Contact — Abqaiq Recreation</title>
  <meta name="description" content="Abqaiq Recreation Services — facilities, activities, and experiences across our community." />
  <meta property="og:title" content="Contact — Abqaiq Recreation" />
  <meta property="og:description" content="Abqaiq Recreation Services — facilities, activities, and experiences across our community." />
  <meta property="og:type" content="website" />
  <meta property="og:image" content="/images/og-image.jpg" />
  <link rel="icon" href="/images/favicon.ico" />
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
  
<header class="site-header" id="header-placeholder"></header>
  
  <main class="container">
    <header class="page-header"><h1>Contact</h1><p>Get in touch with our team.</p></header>
    <form class="contact-form" name="contact" method="post" data-netlify="true">
      <div class="field"><label for="name">Name</label><input id="name" name="name" required /></div>
      <div class="field"><label for="email">Email</label><input id="email" name="email" type="email" required /></div>
      <div class="field"><label for="message">Message</label><textarea id="message" name="message" rows="6" required></textarea></div>
      <button class="btn" type="submit">Send</button>
    </form>
  </main>

<footer class="site-footer" id="footer-placeholder"></footer>
  
  <script src="/js/main.js"></script>
</body>
</html>
